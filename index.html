<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नगर पालिका - ऑटो-लोड जल उपभोक्ता सर्च</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 10px;
        }
        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #fdfefe;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #d5dbdb;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            flex-direction: column;
        }
        .search-box label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #34495e;
            font-size: 14px;
        }
        .search-box input {
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 15px;
            background-color: #fff;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 5px rgba(41, 128, 185, 0.3);
        }
        #statusMessage {
            font-weight: bold;
            color: #b9770e;
            margin-bottom: 15px;
            font-size: 15px;
            text-align: center;
            padding: 10px;
            background-color: #fcf3cf;
            border-radius: 5px;
        }
        .table-container {
            overflow-x: auto;
            max-height: 550px;
            border-radius: 5px;
            border: 1px solid #ecf0f1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }
        th, td {
            padding: 10px 15px;
            border: 1px solid #ecf0f1;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #ebf5fb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>नगर पालिका - ऑटो-लोड जल उपभोक्ता सर्च</h2>
        
        <div id="statusMessage">Google Sheet से डेटा लोड किया जा रहा है, कृपया प्रतीक्षा करें...</div>

        <div class="search-grid">
            <div class="search-box">
                <label>Water ID (न्यू वोटर आईडी)</label>
                <input type="text" id="sWaterId" placeholder="W-26-..." disabled>
            </div>
            <div class="search-box">
                <label>Old Water ID (एग्जैक्ट मैच)</label>
                <input type="text" id="sOldWaterId" placeholder="पूरा पुराना आईडी लिखें..." disabled>
            </div>
            <div class="search-box">
                <label>Consumer Name (नाम)</label>
                <input type="text" id="sName" placeholder="उपभोक्ता का नाम..." disabled>
            </div>
            <div class="search-box">
                <label>Father/Husband Name</label>
                <input type="text" id="sFather" placeholder="पिता/पति का नाम..." disabled>
            </div>
            <div class="search-box">
                <label>Address (पता)</label>
                <input type="text" id="sAddress" placeholder="मकान नं., मोहल्ला..." disabled>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="tableHeader"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let globalData = [];
        let headers = [];

        // अपना Google Apps Script वाला Web App URL यहाँ डालें
        const sheetURL = "https://script.google.com/macros/s/AKfycbzHh-PCNhDVsTZpVPgBTrK9LkNyXK3aP5XiW_jSkmQiMbSuJWKjHoGEehFXuL0EfZVjQQ/exec"; 

        const searchInputs = [
            document.getElementById('sWaterId'),
            document.getElementById('sOldWaterId'),
            document.getElementById('sName'),
            document.getElementById('sFather'),
            document.getElementById('sAddress')
        ];

        // पेज लोड होते ही Google Sheet से डेटा मंगाना शुरू करें
        document.addEventListener("DOMContentLoaded", function() {
            fetch(sheetURL)
                .then(response => response.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        showError("Google Sheet में कोई डेटा नहीं मिला।");
                        return;
                    }

                    // Google Sheet से आया डेटा पहले से ही Array में होता है
                    // पहली लाइन को हेडिंग (headers) बना लें
                    headers = data[0];
                    
                    // बाकी की लाइनों को डेटा (globalData) बना लें
                    globalData = data.slice(1);

                    renderHeaders();
                    renderTable(globalData.slice(0, 50));
                    
                    // डेटा लोड होने के बाद मैसेज हरा कर दें और इनपुट चालू कर दें
                    const statusBox = document.getElementById('statusMessage');
                    statusBox.innerText = `डेटाबेस एक्टिव: सफलतापूर्वक ${globalData.length} रिकॉर्ड लोड हो गए हैं!`;
                    statusBox.style.color = "#196f3d";
                    statusBox.style.backgroundColor = "#d5f5e3";

                    searchInputs.forEach(input => input.disabled = false);
                })
                .catch(error => {
                    showError("डेटा मंगाने में एरर (कृपया लिंक चेक करें): " + error.message);
                });
        });

        function showError(msg) {
            const statusBox = document.getElementById('statusMessage');
            statusBox.innerText = msg;
            statusBox.style.color = "red";
            statusBox.style.backgroundColor = "#fadbd8";
        }

        function renderHeaders() {
            const headerRow = document.getElementById('tableHeader');
            headerRow.innerHTML = '';
            headers.forEach(header => {
                const th = document.createElement('th');
                th.innerText = header;
                headerRow.appendChild(th);
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                for(let i=0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    // Google sheet के खाली सेल को संभालने के लिए || '' लगाया है
                    td.innerText = row[i] !== undefined ? row[i] : ''; 
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const vWaterId = document.getElementById('sWaterId').value.toLowerCase().trim();
            const vOldWaterId = document.getElementById('sOldWaterId').value.toLowerCase().trim();
            const vName = document.getElementById('sName').value.toLowerCase().trim();
            const vFather = document.getElementById('sFather').value.toLowerCase().trim();
            const vAddress = document.getElementById('sAddress').value.toLowerCase().trim();

            if (!vWaterId && !vOldWaterId && !vName && !vFather && !vAddress) {
                renderTable(globalData.slice(0, 50));
                document.getElementById('statusMessage').innerText = `कुल रिकॉर्ड: ${globalData.length} (शुरुआती 50 दिख रहे हैं)`;
                return;
            }

            const filteredData = globalData.filter(row => {
                let match = true;
                
                // ध्यान दें: ये नंबर (0,1,2,3,5) आपकी Google Sheet के कॉलम के हिसाब से होने चाहिए
                // 0: पहला कॉलम, 1: दूसरा कॉलम, आदि
                
                if (vWaterId && !(row[0] && String(row[0]).toLowerCase().includes(vWaterId))) match = false;
                
                // --- Old Water ID एग्जैक्ट मैच (Exact Match) ---
                if (vOldWaterId) {
                    if (!row[1] || String(row[1]).toLowerCase() !== vOldWaterId) {
                        match = false;
                    }
                }
                
                if (vName && !(row[2] && String(row[2]).toLowerCase().includes(vName))) match = false;
                if (vFather && !(row[3] && String(row[3]).toLowerCase().includes(vFather))) match = false;
                if (vAddress && !(row[5] && String(row[5]).toLowerCase().includes(vAddress))) match = false;

                return match;
            });

            renderTable(filteredData.slice(0, 200)); 
            document.getElementById('statusMessage').innerText = `सर्च रिज़ल्ट: ${filteredData.length} रिकॉर्ड मिले।`;
        }

        searchInputs.forEach(input => {
            input.addEventListener('input', filterData);
        });
    </script>
</body>
</html>
