<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नगर पालिका - सुरक्षित जल उपभोक्ता सर्च</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        
        /* लॉगिन स्क्रीन की डिज़ाइन */
        #loginScreen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        #loginScreen input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 16px; text-align: center; }
        #loginScreen button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #loginScreen button:hover { background-color: #1a252f; }
        #loginError { color: red; font-weight: bold; display: none; margin-top: 10px; }

        /* मुख्य ऐप की डिज़ाइन */
        .container { max-width: 1300px; margin: auto; background: #ffffff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #2980b9; padding-bottom: 10px; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #fdfefe; padding: 20px; border-radius: 8px; border: 1px solid #d5dbdb; margin-bottom: 20px; }
        .search-box { display: flex; flex-direction: column; }
        .search-box label { font-weight: 600; margin-bottom: 5px; color: #34495e; font-size: 14px; }
        .search-box input { padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 15px; }
        #statusMessage { font-weight: bold; text-align: center; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .table-container { overflow-x: auto; max-height: 550px; border-radius: 5px; border: 1px solid #ecf0f1; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 10px 15px; border: 1px solid #ecf0f1; text-align: left; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 1; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2 style="border:none;">कर्मचारी लॉगिन</h2>
        <p style="color:#7f8c8d;">डेटाबेस एक्सेस करने के लिए पिन डालें</p>
        <input type="password" id="passInput" placeholder="अपना सीक्रेट पिन डालें">
        <button onclick="checkLogin()">लॉगिन करें</button>
        <p id="loginError">❌ गलत पिन, कृपया दोबारा प्रयास करें!</p>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="container">
            <h2>नगर पालिका - सुरक्षित जल उपभोक्ता सर्च</h2>
            
            <div id="statusMessage" style="background-color: #fcf3cf; color: #b9770e;">डेटा लोड किया जा रहा है, कृपया प्रतीक्षा करें...</div>

            <div class="search-grid">
                <div class="search-box">
                    <label>Water ID (न्यू वोटर आईडी)</label>
                    <input type="text" id="sWaterId" placeholder="W-26-...">
                </div>
                <div class="search-box">
                    <label>Old Water ID (एग्जैक्ट मैच)</label>
                    <input type="text" id="sOldWaterId" placeholder="पूरा पुराना आईडी लिखें...">
                </div>
                <div class="search-box">
                    <label>Consumer Name (नाम)</label>
                    <input type="text" id="sName" placeholder="उपभोक्ता का नाम...">
                </div>
                <div class="search-box">
                    <label>Father/Husband Name</label>
                    <input type="text" id="sFather" placeholder="पिता/पति का नाम...">
                </div>
                <div class="search-box">
                    <label>Address (पता)</label>
                    <input type="text" id="sAddress" placeholder="मकान नं., मोहल्ला...">
                </div>
            </div>

            <div class="table-container">
                <table id="dataTable">
                    <thead><tr id="tableHeader"></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. अपना पिन यहाँ सेट करें ---
        const APP_PASSWORD = "Vidishanagar"; 

        // --- 2. अपना Google Web App URL यहाँ डालें ---
        const sheetURL = "https://script.google.com/macros/s/AKfycbzHh-PCNhDVsTZpVPgBTrK9LkNyXK3aP5XiW_jSkmQiMbSuJWKjHoGEehFXuL0EfZVjQQ/exec"; 
        
        let globalData = [];
        let headers = [];

        function checkLogin() {
            const enteredPass = document.getElementById('passInput').value;
            if (enteredPass === APP_PASSWORD) {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('mainApp').style.display = "block";
                loadDataFromGoogle();
            } else {
                document.getElementById('loginError').style.display = "block";
            }
        }

        document.getElementById("passInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { checkLogin(); }
        });

        function loadDataFromGoogle() {
            fetch(sheetURL)
                .then(response => response.json())
                .then(data => {
                    if (!data || data.length === 0) return;
                    
                    headers = data[0];
                    globalData = data.slice(1);

                    renderHeaders();
                    renderTable(globalData.slice(0, 50));
                    
                    const statusBox = document.getElementById('statusMessage');
                    statusBox.innerText = `डेटाबेस एक्टिव: सफलतापूर्वक ${globalData.length} रिकॉर्ड लोड हो गए हैं!`;
                    statusBox.style.color = "#196f3d";
                    statusBox.style.backgroundColor = "#d5f5e3";
                })
                .catch(error => {
                    const statusBox = document.getElementById('statusMessage');
                    statusBox.innerText = "डेटा मंगाने में एरर: " + error.message;
                    statusBox.style.color = "red";
                });
        }

        function renderHeaders() {
            const headerRow = document.getElementById('tableHeader');
            headerRow.innerHTML = '';
            headers.forEach(header => {
                const th = document.createElement('th');
                th.innerText = header;
                headerRow.appendChild(th);
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                for(let i=0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    td.innerText = row[i] !== undefined ? row[i] : ''; 
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const vWaterId = document.getElementById('sWaterId').value.toLowerCase().trim();
            const vOldWaterId = document.getElementById('sOldWaterId').value.toLowerCase().trim();
            const vName = document.getElementById('sName').value.toLowerCase().trim();
            const vFather = document.getElementById('sFather').value.toLowerCase().trim();
            const vAddress = document.getElementById('sAddress').value.toLowerCase().trim();

            const filteredData = globalData.filter(row => {
                let match = true;
                if (vWaterId && !(row[0] && String(row[0]).toLowerCase().includes(vWaterId))) match = false;
                if (vOldWaterId && (!row[1] || String(row[1]).toLowerCase() !== vOldWaterId)) match = false;
                if (vName && !(row[2] && String(row[2]).toLowerCase().includes(vName))) match = false;
                // पिता के नाम का फ़िल्टर भी यहाँ मौजूद है
                if (vFather && !(row[3] && String(row[3]).toLowerCase().includes(vFather))) match = false;
                if (vAddress && !(row[5] && String(row[5]).toLowerCase().includes(vAddress))) match = false;
                return match;
            });

            renderTable(filteredData.slice(0, 200)); 
            document.getElementById('statusMessage').innerText = `सर्च रिज़ल्ट: ${filteredData.length} रिकॉर्ड मिले।`;
        }

        // सभी 5 सर्च बॉक्स एक साथ काम करेंगे
        ['sWaterId', 'sOldWaterId', 'sName', 'sFather', 'sAddress'].forEach(id => {
            document.getElementById(id).addEventListener('input', filterData);
        });
    </script>
</body>
</html>
